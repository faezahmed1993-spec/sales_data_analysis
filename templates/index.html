<!DOCTYPE html>
<html>
<head>
    <title>Sales Data Analysis Dashboard</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            background-color: #f4f6f7;
        }

        h1{
            margin-top: 30px;
        }

        .chart-container{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 40px;
        }

        .chart{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        img{
            width: 80%;
            height: 90%;
        }
    </style>
</head>

<body>

<h1>Sales Data Analysis Dashboard</h1>

<div class="chart-container">

    <div class="chart">
        <h3>Deal Size-wise Total Sales</h3>
        <img src="static/dealsize_sales.png">
    </div>

    <div class="chart">
        <h3>Year-wise Total Sales</h3>
        <img src="static/year_sales.png">
    </div>

    <div class="chart">
        <h3>Product Line-wise Total Sales</h3>
        <img src="static/productline_sales.png">
    </div>

    <div class="chart">
        <h3>Month-wise Total Sales</h3>
        <img src="static/month_sales.png">
    </div>

</div>

</body>
</html>
